<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PhishGuard Settings</title>
    <style>
      :root {
        --bg-canvas: #0d1117;
        --surface: #161b22;
        --surface-strong: #1c2128;
        --foreground: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --primary: #58a6ff;
        --primary-foreground: #0d1117;
        --ring: rgba(88, 166, 255, 0.3);
        --radius-xl: 12px;
        --radius-md: 8px;
        --danger: #f85149;
        --success: #3fb950;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        background: var(--bg-canvas);
        color: var(--foreground);
        color-scheme: dark;
      }
      .settings-shell { width: min(100%, 340px); margin: 0 auto; }
      .settings-header,
      .option-group {
        margin-bottom: 12px;
        padding: 14px;
        border-radius: var(--radius-xl);
        background: var(--surface);
        border: 1px solid var(--border);
      }
      .settings-brand { display: flex; align-items: center; gap: 12px; }
      .settings-brand img { width: 40px; height: 40px; border-radius: 10px; display: block; }
      .settings-brand h1 { margin: 0; font-size: 1.05rem; font-weight: 600; }
      .settings-brand p { margin: 3px 0 0; font-size: 0.8rem; color: var(--muted); }
      label { display: block; margin-bottom: 6px; font-size: 0.86rem; font-weight: 600; }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg-canvas);
        color: var(--foreground);
      }
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--ring);
      }
      .help-text { margin-top: 8px; font-size: 12px; line-height: 1.45; color: var(--muted); }
      button {
        width: 100%;
        margin-top: 8px;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        padding: 10px 12px;
        cursor: pointer;
        background: var(--primary);
        color: var(--primary-foreground);
        font-weight: 600;
      }
      button:hover { background: #79b8ff; border-color: #79b8ff; }
      .button-row { display: flex; gap: 8px; margin-top: 8px; }
      .button-row button {
        flex: 1;
        width: auto;
        margin-top: 0;
        background: var(--surface-strong);
        color: var(--foreground);
        border-color: var(--border);
      }
      .button-row button:hover { background: #21262d; }
      #status { margin-top: 10px; font-size: 0.82rem; display: none; }
      #status.success { color: var(--success); }
      #status.error { color: var(--danger); }
    </style>
  </head>
  <body>
    <main class="settings-shell">
      <header class="settings-header">
        <div class="settings-brand">
          <img src="assets/logo-48.png" alt="PhishGuard" />
          <div>
            <h1>PhishGuard</h1>
            <p>Extension settings</p>
          </div>
        </div>
      </header>
      <div class="option-group">
        <label for="apiUrl">Dashboard/API URL</label>
        <input type="text" id="apiUrl" placeholder="https://phish-guard-rho.vercel.app" />
        <div class="button-row">
          <button id="useLiveApp" type="button">Use Live App</button>
          <button id="useLocalDev" type="button">Use Localhost Dev</button>
        </div>
        <div class="help-text">Use the live app for normal sign-in. Switch to <code>localhost</code> only when <code>bun run dev:web</code> is running.</div>
      </div>
      <div class="option-group">
        <label for="apiToken">API Token (optional)</label>
        <input type="password" id="apiToken" placeholder="Leave empty for normal sign-in" />
        <div class="help-text">Paste a token from <code>/ext-auth</code> only if popup sign-in fails.</div>
      </div>
      <div class="option-group">
        <label>
          <input type="checkbox" id="autoScan" />
          Automatically scan emails when opened
        </label>
      </div>
      <button id="save">Save Settings</button>
      <div id="status">Settings saved.</div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
